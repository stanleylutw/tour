<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>旅遊日誌 | Itinerary</title>
    <meta name="description" content="家庭旅行入口網站與旅行紀錄書">
    <meta name="application-name" content="旅遊日誌">
    <meta name="apple-mobile-web-app-title" content="旅遊日誌">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f5f8fc">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/app-icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/app-icons/icon-192.png">
    <link rel="stylesheet" href="styles.css?v=20260625-30">
  </head>
  <body>
    <div id="app" class="app-shell">
      <section id="login-screen" class="login-screen" aria-labelledby="login-title">
        <div class="login-panel">
          <img class="login-logo" src="assets/images/family_logo_2026.png" alt="Family logo">
          <p class="eyebrow">Itinerary</p>
          <h1 id="login-title">我們的旅行紀錄書</h1>
          <p class="login-copy">輸入 family passcode 後，就可以查看行程、上傳每日照片、寫下旅行心得。</p>
          <form id="login-form" class="login-form">
            <label for="passcode">Family passcode</label>
            <div class="login-row">
              <input id="passcode" name="passcode" type="password" inputmode="numeric" autocomplete="current-password" placeholder="請輸入 passcode">
              <button type="submit">進入</button>
            </div>
            <p id="login-error" class="form-error" role="alert"></p>
          </form>
        </div>
      </section>

      <main id="main-app" class="main-app hidden">
        <header class="topbar">
          <button id="menu-button" class="icon-button menu-only-button" type="button" aria-label="所有旅程">
            <span aria-hidden="true">☰</span>
          </button>
          <button id="current-trip-button" class="icon-text-button trip-title-button" type="button">
            <span>旅遊日誌</span>
          </button>
          <button id="calendar-mode-button" class="icon-text-button hidden" type="button" aria-label="切換月曆模式">
            <span aria-hidden="true">▣</span>
          </button>
          <button id="logout-button" class="icon-button" type="button" aria-label="登出">⎋</button>
        </header>

        <section id="portal-view" class="portal-view hidden" aria-labelledby="portal-title">
          <div class="section-heading">
            <p class="eyebrow">Itinerary</p>
            <h1 id="portal-title">所有旅程</h1>
          </div>
          <div id="trip-list" class="trip-list"></div>
        </section>

        <section id="trip-view" class="trip-view hidden">
          <div id="trip-hero" class="trip-hero"></div>
          <section id="overview" class="content-section"></section>
          <div id="trip-calendar" class="trip-calendar"></div>

          <section id="days" class="content-section"></section>
          <section id="bookings" class="content-section"></section>
          <section id="record" class="content-section"></section>
          <section id="pending" class="content-section"></section>
        </section>
      </main>
    </div>

    <div id="attachment-modal" class="attachment-modal" hidden>
      <div class="attachment-dialog" role="dialog" aria-modal="true" aria-labelledby="attachment-title">
        <div class="attachment-header">
          <strong id="attachment-title">附件預覽</strong>
          <button id="attachment-close" class="attachment-close" type="button" aria-label="關閉附件">×</button>
        </div>
        <div id="attachment-body" class="attachment-body"></div>
      </div>
    </div>

    <script src="script.js?v=20260625-24"></script>
  </body>
</html>
